<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <title>OuinoChat</title>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed": "#f4dce4",
              "on-tertiary-fixed-variant": "#474647",
              "outline": "#8e6f74",
              "primary-container": "#d81b60",
              "surface-variant": "#e1e3e4",
              "tertiary-fixed-dim": "#c8c6c7",
              "on-secondary": "#ffffff",
              "on-error-container": "#93000a",
              "secondary-fixed-dim": "#d7c1c8",
              "on-secondary-container": "#716066",
              "primary": "#b0004a",
              "on-tertiary-fixed": "#1b1b1c",
              "surface-tint": "#bc004f",
              "surface-dim": "#d9dadb",
              "surface": "#f8f9fa",
              "primary-fixed": "#ffd9de",
              "on-primary": "#ffffff",
              "secondary": "#6b5a60",
              "on-tertiary": "#ffffff",
              "inverse-primary": "#ffb2bf",
              "tertiary-container": "#717071",
              "on-background": "#191c1d",
              "surface-container-low": "#f3f4f5",
              "on-primary-fixed": "#3f0016",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#edeeef",
              "outline-variant": "#e3bdc3",
              "error-container": "#ffdad6",
              "tertiary": "#585859",
              "surface-bright": "#f8f9fa",
              "secondary-container": "#f4dce4",
              "inverse-surface": "#2e3132",
              "surface-container-highest": "#e1e3e4",
              "on-surface-variant": "#5a4044",
              "on-error": "#ffffff",
              "on-surface": "#191c1d",
              "on-secondary-fixed": "#25181e",
              "surface-container-high": "#e7e8e9",
              "on-primary-fixed-variant": "#90003b",
              "on-secondary-fixed-variant": "#524249",
              "inverse-on-surface": "#f0f1f2",
              "error": "#ba1a1a",
              "background": "#f8f9fa",
              "tertiary-fixed": "#e5e2e3",
              "on-primary-container": "#fff2f3",
              "on-tertiary-container": "#f8f5f6",
              "primary-fixed-dim": "#ffb2bf"
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8f9fa;
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
      }
      #root {
        height: 100vh;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
      .chat-scroll::-webkit-scrollbar { width: 4px; }
      .chat-scroll::-webkit-scrollbar-track { background: transparent; }
      .chat-scroll::-webkit-scrollbar-thumb { background: #e3bdc3; border-radius: 10px; }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
  </head>
  <body class="h-screen overflow-hidden text-on-surface">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
